name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release commit
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6

      - name: Set up pnpm
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports trusted publishing
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          npm_version="$(npm --version)"
          node -e '
            const version = process.env.npm_config_user_agent?.match(/npm\/([0-9.]+)/)?.[1] ?? process.argv[1];
            const [major, minor, patch] = version.split(".").map(Number);
            if (major < 11 || (major === 11 && minor < 5) || (major === 11 && minor === 5 && patch < 1)) {
              throw new Error(`npm ${version} is too old for trusted publishing; require >=11.5.1`);
            }
          ' "$npm_version"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Verify release package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          pnpm test
          pnpm run typecheck
          pnpm run lint
          pnpm run format:check
          pnpm run architecture:check
          npm publish --dry-run --access public --json

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm publish --access public --provenance
