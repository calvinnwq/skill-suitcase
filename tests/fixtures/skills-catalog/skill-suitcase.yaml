suitcases:
  core:
    skills:
      - office-hours

  openclaw-builder:
    skills:
      - skillify
      - gnhf-postflight

assignments:
  openclaw:
    suitcases:
      - core
      - openclaw-builder
  codex:
    suitcases:
      - core
  openclaw-codex:
    suitcases:
      - core
  claude:
    suitcases:
      - core

assignmentPaths:
  openclaw:
    kind: openclaw-skills-root
    path: /tmp/openclaw/skills
    assignment: openclaw

  codex:
    kind: codex-home
    codexHome: /tmp/codex
    skillsPath: /tmp/codex/skills
    assignment: codex

  openclaw-codex:
    kind: codex-home
    codexHome: /tmp/openclaw-codex
    skillsPath: /tmp/openclaw-codex/skills
    assignment: openclaw-codex

  claude:
    kind: claude-skills-root
    path: /tmp/claude/skills
    assignment: claude

groups:
  portable-core:
    title: Portable Core
    description: Skills that are intended to travel across supported agent runtimes.
    suitcases:
      - core
    assignments:
      - codex
      - claude
      - openclaw-codex
    tags:
      - portable

  openclaw-builder-tools:
    title: OpenClaw Builder Tools
    description: OpenClaw-native workflow and maintenance skills.
    provider: openclaw
    skills:
      - skillify
      - gnhf-postflight
    suitcases:
      - openclaw-builder
    tags:
      - workflow

  codex-assigned:
    title: Codex Assigned
    description: Skills included through the Codex assignment.
    assignments:
      - codex
    tags:
      - assignment

compatibility:
  office-hours:
    agents:
      - openclaw
      - codex
      - claude
    variant: canonical
    evidence:
      - docs/install-smoke.md

  skillify:
    agents:
      - openclaw
    variant: canonical
    reason: Uses OpenClaw skill proposal and resolver workflow concepts.

  gnhf-postflight:
    agents:
      - openclaw
    variant: canonical
    reason: Canonical bundle depends on OpenClaw delegation, freshness, and artifact conventions.
    blockedAgents:
      codex: Live Codex copy is a slimmer platform variant and must not be overwritten by the OpenClaw canonical bundle.
      claude: Live Claude copy is a slimmer platform variant and must not be overwritten by the OpenClaw canonical bundle.
    evidence:
      - docs/portability-matrix.md

variants:
  gnhf-postflight:
    canonical:
      source: skills/gnhf-postflight
      agents:
        - openclaw
    codex:
      source: variants/codex/gnhf-postflight
      agents:
        - codex
    claude:
      source: variants/claude/gnhf-postflight
      agents:
        - claude
